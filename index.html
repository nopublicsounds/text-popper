<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-popper</title>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            -webkit-user-select:none;
            -moz-user-select:none;
            -ms-user-select:none;
            user-select:none
        }

        h2{
            margin: 0;
            padding: 0;
        }

        #toggleGravity{
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.5rem 1rem;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
            z-index: 999;
        }
    </style>
</head>
<body id = "board" style = "position:relative; width:100vw; height:100vh; overflow:hidden;" ondragstart = "return false;">
    <div style = "position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center;">
        <h1>Text-Popper</h1>
        <p>type something...</p>
    </div>

    <button id="toggleGravity">Gravity Toggle</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="script.js"></script>
</body>
